<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1830" />
      <stop offset="55%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14f195" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.45" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="520" rx="20" fill="url(#bg)" />
  <rect x="16" y="16" width="768" height="488" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" />

  <rect x="40" y="40" width="720" height="440" rx="12" fill="#0f0f14" stroke="#ffffff" stroke-opacity="0.06" />
  <rect x="40" y="40" width="720" height="44" rx="12" fill="#16161d" />
  <rect x="40" y="72" width="720" height="12" fill="#16161d" />
  <circle cx="64" cy="62" r="5" fill="#ff5f57" fill-opacity="0.85" />
  <circle cx="84" cy="62" r="5" fill="#febc2e" fill-opacity="0.85" />
  <circle cx="104" cy="62" r="5" fill="#28c840" fill-opacity="0.85" />
  <rect x="140" y="54" width="280" height="16" rx="8" fill="#ffffff" fill-opacity="0.06" />

  <ellipse cx="400" cy="280" rx="220" ry="120" fill="#14f195" fill-opacity="0.1" filter="url(#glow)" />

  <!-- Chat layout -->
  <rect x="72" y="108" width="200" height="340" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <rect x="92" y="128" width="140" height="36" rx="10" fill="#14f195" fill-opacity="0.12" />
  <rect x="92" y="180" width="140" height="36" rx="10" fill="#ffffff" fill-opacity="0.04" />
  <rect x="92" y="232" width="140" height="36" rx="10" fill="#ffffff" fill-opacity="0.04" />
  <rect x="92" y="284" width="140" height="36" rx="10" fill="#ffffff" fill-opacity="0.04" />

  <rect x="292" y="108" width="440" height="340" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" />
  <rect x="312" y="128" width="220" height="44" rx="16" fill="#ffffff" fill-opacity="0.06" />
  <rect x="312" y="188" width="280" height="44" rx="16" fill="#14f195" fill-opacity="0.18" />
  <rect x="452" y="248" width="240" height="44" rx="16" fill="#ffffff" fill-opacity="0.06" />
  <rect x="312" y="308" width="300" height="44" rx="16" fill="#14f195" fill-opacity="0.12" />

  <rect x="312" y="392" width="360" height="44" rx="22" fill="#16161d" stroke="#ffffff" stroke-opacity="0.08" />
  <rect x="328" y="408" width="220" height="12" rx="6" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="648" cy="414" r="14" fill="url(#accent)" fill-opacity="0.55" />
</svg>
