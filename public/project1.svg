<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1020" />
      <stop offset="55%" stop-color="#120a14" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7e5f" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#e8390d" stop-opacity="0.5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="520" rx="20" fill="url(#bg)" />
  <rect x="16" y="16" width="768" height="488" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" />

  <!-- Browser chrome -->
  <rect x="40" y="40" width="720" height="440" rx="12" fill="#0f0f14" stroke="#ffffff" stroke-opacity="0.06" />
  <rect x="40" y="40" width="720" height="44" rx="12" fill="#16161d" />
  <rect x="40" y="72" width="720" height="12" fill="#16161d" />
  <circle cx="64" cy="62" r="5" fill="#ff5f57" fill-opacity="0.85" />
  <circle cx="84" cy="62" r="5" fill="#febc2e" fill-opacity="0.85" />
  <circle cx="104" cy="62" r="5" fill="#28c840" fill-opacity="0.85" />
  <rect x="140" y="54" width="280" height="16" rx="8" fill="#ffffff" fill-opacity="0.06" />

  <!-- Ambient glow -->
  <ellipse cx="400" cy="280" rx="220" ry="120" fill="#ff7e5f" fill-opacity="0.12" filter="url(#glow)" />

  <!-- Abstract dashboard UI -->
  <rect x="72" y="108" width="180" height="340" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <rect x="92" y="128" width="120" height="10" rx="5" fill="url(#accent)" fill-opacity="0.7" />
  <rect x="92" y="152" width="140" height="8" rx="4" fill="#ffffff" fill-opacity="0.08" />
  <rect x="92" y="172" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.05" />
  <rect x="92" y="210" width="140" height="56" rx="8" fill="#ff7e5f" fill-opacity="0.12" stroke="#ff7e5f" stroke-opacity="0.2" />
  <rect x="92" y="284" width="140" height="56" rx="8" fill="#ffffff" fill-opacity="0.04" />
  <rect x="92" y="358" width="140" height="56" rx="8" fill="#ffffff" fill-opacity="0.04" />

  <rect x="276" y="108" width="456" height="160" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <rect x="296" y="128" width="200" height="12" rx="6" fill="#ffffff" fill-opacity="0.1" />
  <rect x="296" y="154" width="320" height="8" rx="4" fill="#ffffff" fill-opacity="0.06" />
  <rect x="296" y="172" width="260" height="8" rx="4" fill="#ffffff" fill-opacity="0.04" />
  <rect x="296" y="210" width="120" height="32" rx="16" fill="url(#accent)" fill-opacity="0.35" />

  <rect x="276" y="288" width="220" height="160" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <rect x="296" y="308" width="80" height="80" rx="40" fill="none" stroke="#ff7e5f" stroke-opacity="0.35" stroke-width="8" stroke-dasharray="120 80" />
  <rect x="396" y="308" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.08" />
  <rect x="396" y="328" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.05" />

  <rect x="512" y="288" width="220" height="160" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.05" />
  <polyline points="532,410 572,360 612,380 652,320 692,340" fill="none" stroke="#14f195" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="532" y="308" width="100" height="10" rx="5" fill="#ffffff" fill-opacity="0.08" />
</svg>
